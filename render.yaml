services:
  - type: web
    name: jkuat-scheduler
    env: python
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jkuat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString

  - type: worker
    name: jkuat-celery
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A tasks worker -Q notifications,default --concurrency=4 --loglevel=info
    envVars:
      - key: FLASK_SECRET_KEY
        fromService:
          name: jkuat-scheduler
          type: web
          envVarKey: FLASK_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: jkuat-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_URL
        fromService:
          name: jkuat-redis
          type: redis
          property: connectionString

  - type: redis
    name: jkuat-redis
    plan: free
    ipAllowList: []

databases:
  - name: jkuat-db
    plan: free

